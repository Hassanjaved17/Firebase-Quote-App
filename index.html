<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8">

  <title>Quote Vault — Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

 <link rel="stylesheet" href="auth.css">

    :root {
      --bg:            #060b14;
      --bg-card:       rgba(12, 24, 48, 0.85);
      --cyan:          #00d4ff;
      --cyan-dim:      rgba(0, 212, 255, 0.1);
      --cyan-border:   rgba(0, 212, 255, 0.25);
      --cyan-glow:     rgba(0, 212, 255, 0.2);
      --cyan-text:     #7ef0ff;

      --border-bright: rgba(0, 212, 255, 0.22);

      --success:       #34d399;
      --text-primary:  #ffffff;
      --text-secondary:#94c8e0;
      --text-muted:    #4a7a96;
      --radius-md: 8px;
      --radius-lg: 14px;
      --transition: 0.2s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      background: var(--bg);
      color: var(--text-primary);
      background-image:
        repeating-linear-gradient(0deg,
          transparent, transparent 2px,
          rgba(0,212,255,0.006) 2px,
          rgba(0,212,255,0.006) 4px),
        radial-gradient(ellipse 80% 60% at 20% 0%,  rgba(0,90,180,0.4)  0%, transparent 65%),

    }

    /* ── Brand Header ── */
    .auth-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      animation: fadeDown .5s ease both;
    }

    .auth-brand-badge {
      width: 48px; height: 48px;
      border: 1px solid var(--cyan-border);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,212,255,0.1);
      box-shadow: 0 0 28px var(--cyan-glow);
      margin-bottom: 4px;
    }
    .auth-brand-badge svg { color: var(--cyan); }

    .auth-brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem; font-weight: 800;
      letter-spacing: 3px; text-transform: uppercase;
      color: #ffffff;
    }
    .auth-brand-name span { color: var(--cyan); }

    .auth-brand-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan); opacity: .7;
    }

    /* ── Auth Card ── */
    .auth-wrapper {
      width: 100%; max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,212,255,.05) inset,
        0 0 60px rgba(0,212,255,.08),
        0 32px 64px rgba(0,0,0,.6);
      animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both;
      position: relative;
    }

    /* Top cyan line */
    .auth-wrapper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: .8;
    }

    /* Corner bracket */
    .auth-wrapper::after {
      content: '';
      position: absolute;
      bottom: 16px; right: 16px;
      width: 18px; height: 18px;
      border-bottom: 1px solid var(--cyan-border);
      border-right:  1px solid var(--cyan-border);
    }

    .auth-section { padding: 28px 32px; }
    .auth-section + .auth-section { padding-top: 24px; }

    hr { border:none; border-top: 1px solid var(--border); }

    .auth-section h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: #ffffff; letter-spacing: .5px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .auth-section h2::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
      flex-shrink: 0;
    }

    /* ── Inputs ── */
    form { display: flex; flex-direction: column; gap: 10px; }
    br   { display: none; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%; padding: 12px 16px;
      background: rgba(0,212,255,.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 14px; color: #ffffff;
      outline: none; caret-color: var(--cyan);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      border-color: var(--cyan-border);
      background: rgba(0,212,255,.07);
      box-shadow: 0 0 0 3px var(--cyan-glow);
    }
    input.input--error {
      border-color: var(--danger) !important;
      box-shadow: 0 0 0 3px rgba(248,113,113,.2) !important;
      background: rgba(248,113,113,.04) !important;
    }

    .input-error-msg {
      display: block; font-size: 12px; color: var(--danger);
      margin-top: -4px; padding-left: 2px;
      font-family: 'IBM Plex Mono', monospace;
      animation: fadeIn .2s ease both;
    }

    .password-row { display: flex; flex-direction: column; gap: 6px; }

    .forgot-link {
      align-self: flex-end;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing: .5px;
      color: var(--text-muted); text-decoration: none;
      transition: color var(--transition);
    }
    .forgot-link:hover { color: var(--cyan); }

    /* ── Buttons ── */
    button {
      width: 100%; padding: 12px 18px;
      border: none; border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600; letter-spacing: .2px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

    #signup-btn, #login-btn {
      background: rgba(0,212,255,.12);
      border: 1px solid var(--cyan-border);
      color: var(--cyan);
      box-shadow: 0 0 20px var(--cyan-glow);
      margin-top: 4px;
    }
    #signup-btn:hover:not(:disabled),
    #login-btn:hover:not(:disabled) {
      background: rgba(0,212,255,.2);
      border-color: var(--cyan);
      box-shadow: 0 0 32px rgba(0,212,255,.3);
      transform: translateY(-1px);
    }
    #signup-btn:active, #login-btn:active { transform: translateY(0); }

    /* Google */
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 18px; margin-top: 4px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all var(--transition);
    }
    .google-btn:hover:not(:disabled) {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.25);
      color: #ffffff; transform: translateY(-1px);
    }
    .google-btn:active { transform: translateY(0); }
    .google-btn svg { flex-shrink: 0; }

    /* OR divider */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 6px 0;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .or-divider span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted);
    }

    /* Spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,212,255,.2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    .google-btn .spinner {
      border-color: rgba(255,255,255,.2);
      border-top-color: #ffffff;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      opacity: 0; z-index: 9999;
      display: flex; align-items: center; gap: 9px;
      padding: 12px 20px; border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 13.5px; font-weight: 500;
      white-space: nowrap; pointer-events: none;
      backdrop-filter: blur(20px);
      transition: opacity .3s ease, transform .3s cubic-bezier(.22,1,.36,1);
    }
    .toast--show  { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast--success {
      background: rgba(10,20,40,.95);
      border: 1px solid rgba(52,211,153,.4); color: var(--success);
      box-shadow: 0 8px 32px rgba(52,211,153,.2);
    }
    .toast--error {
      background: rgba(10,20,40,.95);
      border: 1px solid rgba(248,113,113,.4); color: var(--danger);
      box-shadow: 0 8px 32px rgba(248,113,113,.2);
    }
    .toast--info {
      background: rgba(10,20,40,.95);
      border: 1px solid var(--cyan-border); color: var(--cyan-text);
      box-shadow: 0 8px 32px var(--cyan-glow);
    }

    /* Footer */
    .auth-footer {
      margin-top: 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      animation: fadeUp .5s ease .2s both;
    }
    .auth-footer-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted);
    }
    .auth-footer-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
      animation: footerPulse 2s ease-in-out infinite;
    }

    /* Animations */
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes footerPulse {
      0%,100%{opacity:1;box-shadow:0 0 6px var(--cyan)}
      50%{opacity:.3;box-shadow:none}
    }

    @media (max-width: 480px) {
      .auth-section { padding: 24px 20px; }
      .toast { white-space:normal; max-width:calc(100vw - 40px); }
    }
  </style> -->


<body>

  <!-- Brand -->
  <div class="auth-brand">
    <div class="auth-brand-badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <div class="auth-brand-name">Quote <span>Vault</span></div>
    <div class="auth-brand-sub">Vol. I — 2026</div>
  </div>

  <div class="auth-wrapper">

    <!-- Sign Up -->
    <div class="auth-section">
      <h2>Sign Up</h2>
      <form id="signup-form" novalidate>
        <input type="email"    id="signup-email"    placeholder="Email address"           autocomplete="email"        required>
        <input type="password" id="signup-password" placeholder="Password (min. 6 chars)" autocomplete="new-password" required>
        <button type="submit"  id="signup-btn">Create Account</button>
      </form>
    </div>

    <hr>

    <!-- Login -->
    <div class="auth-section">
      <h2>Login</h2>
      <form id="login-form" novalidate>
        <input type="email" id="login-email" placeholder="Email address" autocomplete="email" required>
        <div class="password-row">
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
          <a href="reset.html" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" id="login-btn">Sign In</button>
      </form>

      <div class="or-divider"><span>or</span></div>

      <button type="button" id="google-btn" class="google-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18">
          <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.8 0-14.5 4.3-17.7 10.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.7-2.9-11.9-7.2l-6.6 5.1C9.4 39.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.7 35.5 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/>
        </svg>
        Continue with Google
      </button>
    </div>

  </div>

  <!-- Footer -->
  <div class="auth-footer">
    <div class="auth-footer-dot"></div>
    <span class="auth-footer-text">© 2026 Hassan Javed — Quote Vault</span>
    <div class="auth-footer-dot"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <script type="module" src="auth.js"></script>
</body>
