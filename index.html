<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Vault</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- Background orbs -->
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <div class="orb orb--3"></div>

  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path
            d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" />
          <path
            d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z" />
        </svg>
        Quote Vault
      </div>
      <div class="header-count">
        <span id="quote-count">—</span> quotes
      </div>
    </header>

    <!-- ── Main Quote Display ── -->
    <main class="quote-stage">

      <div class="quote-card" id="quote-card">
        <div class="quote-loading" id="quote-loading">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
        </div>

        <div class="quote-content" id="quote-content" style="display:none;">
          <div class="quote-mark">"</div>
          <blockquote id="quote-text">Loading...</blockquote>
          <div class="quote-meta">
            <span class="quote-author" id="quote-author">— Unknown</span>
            <span class="quote-category" id="quote-category"></span>
          </div>

          <div class="quote-actions">
            <button class="action-btn like-btn" id="like-btn" title="Like this quote">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
              </svg>
              <span id="like-count">0</span>
            </button>

            <button class="action-btn copy-btn" id="copy-btn" title="Copy quote">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
              </svg>
              Copy
            </button>

            <button class="action-btn delete-btn" id="delete-btn" title="Delete quote">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                <path d="M10 11v6M14 11v6" />
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
              </svg>
              Delete
            </button>
          </div>
        </div>

        <div class="quote-empty" id="quote-empty" style="display:none;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
            opacity="0.3">
            <path
              d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" />
            <path
              d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z" />
          </svg>
          <p>No quotes yet.<br>Add your first one below!</p>
        </div>
      </div>

      <!-- New Quote Button -->
      <button class="new-quote-btn" id="new-quote-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 .49-4.47" />
        </svg>
        New Quote
      </button>

    </main>

    <!-- ── Add Quote Form ── -->
    <section class="add-section">
      <div class="add-card">
        <h2 class="add-title">Add a Quote</h2>

        <div class="form-group">
          <textarea id="input-text" placeholder="Enter your quote here..." rows="3" maxlength="300"></textarea>
          <span class="char-count"><span id="char-current">0</span>/300</span>
        </div>

        <div class="form-row">
          <input type="text" id="input-author" placeholder="Author name" maxlength="60">
          <input type="text" id="input-category" placeholder="Category (optional)" maxlength="30">
        </div>

        <button class="submit-btn" id="submit-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add to Vault
        </button>
      </div>
    </section>

    <!-- ── All Quotes List ── -->
    <section class="list-section">
      <div class="list-header">
        <h2 class="list-title">All Quotes</h2>
        <div class="list-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="liked">❤️ Liked</button>
        </div>
      </div>
      <div class="quotes-list" id="quotes-list">

      </div>
    </section>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="app.js"></script>
</body>

</html>
